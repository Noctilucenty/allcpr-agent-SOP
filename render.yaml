# Render Blueprint for the AllCPR Site Operations Agent.
# Deploy: push this repo to GitHub, then in Render -> "New +" -> "Blueprint"
# and point it at this repo. Render reads this file automatically.
#
# The app is a single FastAPI service (web_app:app) served by uvicorn. It runs
# fully local/deterministic by default (no external API, no database). The only
# committed secret is the staff-access unlock PIN (ALLCPR_STAFF_ACCESS_PIN).
# SOP images are extracted on first request from the committed SOP/ folder into
# app/web/static/sop_media (ephemeral disk is fine — they rebuild on boot).
#
# Optional AI layer: setting ALLCPR_AI_ENABLED=true turns on the interpret/
# summarize layer, but ONLY if OPENAI_API_KEY is also present. The key is a
# billing credential and is NEVER committed here — it is declared sync:false so
# its value lives only in the Render dashboard (Environment tab).
services:
  - type: web
    name: allcpr-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web_app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Match the locally tested interpreter.
      - key: PYTHON_VERSION
        value: "3.12.6"
      # Staff-access unlock PIN for revealing redacted internal passcodes.
      # NOTE: committed in plaintext by request (internal tool, accepted low risk
      # for now). Planned to move to phone/SMS verification later; when that lands,
      # rotate this value and move it to a Render dashboard secret (sync:false).
      - key: ALLCPR_STAFF_ACCESS_PIN
        value: "2745"
      # --- Optional AI orchestration layer ---
      # Flag + model are not secrets, so they can live here.
      - key: ALLCPR_AI_ENABLED
        value: "true"
      # Model id must match OpenAI's exact spelling (see platform.openai.com/docs/models).
      # An unknown id makes the AI call fail and fall back to deterministic mode.
      - key: ALLCPR_AI_MODEL
        value: "gpt-5.4-mini"
      # Billing credential: value is dashboard-managed only (never in git).
      # Set it in Render -> allcpr-agent -> Environment -> OPENAI_API_KEY,
      # using a freshly rotated key. Until it is set, the app runs deterministic.
      - key: OPENAI_API_KEY
        sync: false
